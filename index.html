<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Ontdek zorgtechnologie bij Vereen: exoskelet, HUME sok, Vendlet bed, slimme toiletbril en meer innovaties voor de zorg.">

    <title>Zorgtechnologie bij Vereen</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="site-header">
        <img src="images/logo-header.svg" alt="Vereen" class="site-logo">
    </header>

    <!-- HOME BUTTON (alleen op detailpagina's) -->
    <button class="home-btn" onclick="showHome()" aria-label="Terug naar overzicht">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>

    <!-- HOMEPAGE -->
    <section id="home">

        <div class="hero">
            <div class="hero-inner">
                <p class="hero-label">Innovaties</p>
                <div class="hero-row">
                    <h1>Zorgtechnologie bij Vereen</h1>
                    <p class="hero-text">Ontdek innovatieve oplossingen die zorgmedewerkers ondersteunen en de kwaliteit van zorg verbeteren.</p>
                </div>
            </div>
        </div>

        <div class="grid-section">
            <h2 class="grid-heading">Kies een thema</h2>
            <div class="grid">

            <div class="card" onclick="openSection(0)">
                <img src="images/exoskelet.jpg" alt="Exoskelet">
                <div class="card-overlay"></div>
                <span class="card-number">1</span>
                <div class="card-title">
                    <span class="card-title-text">Exoskelet</span>
                    <span class="card-arrow">›</span>
                </div>
            </div>

            <div class="card" onclick="openSection(1)">
                <img src="images/Hume.jpg" alt="HUME Sok">
                <div class="card-overlay"></div>
                <span class="card-number">2</span>
                <div class="card-title">
                    <span class="card-title-text">HUME Sok</span>
                    <span class="card-arrow">›</span>
                </div>
            </div>

            <div class="card" onclick="openSection(2)">
                <img src="images/Vendlet.jpg" alt="Vendlet Bed">
                <div class="card-overlay"></div>
                <span class="card-number">3</span>
                <div class="card-title">
                    <span class="card-title-text">Vendlet Bed</span>
                    <span class="card-arrow">›</span>
                </div>
            </div>

            <div class="card" onclick="openSection(3)">
                <img src="images/slimme-WC-bril.jpg" alt="Slimme Toiletbril">
                <div class="card-overlay"></div>
                <span class="card-number">4</span>
                <div class="card-title">
                    <span class="card-title-text">Slimme Toiletbril</span>
                    <span class="card-arrow">›</span>
                </div>
            </div>

            <div class="card" onclick="openSection(4)">
                <img src="images/attendi.jpg" alt="Attendi App">
                <div class="card-overlay"></div>
                <span class="card-number">5</span>
                <div class="card-title">
                    <span class="card-title-text">Attendi App</span>
                    <span class="card-arrow">›</span>
                </div>
            </div>

            <div class="card" onclick="openSection(5)">
                <img src="images/ontvangstrobot.jpg" alt="Ontvangstrobot">
                <div class="card-overlay"></div>
                <span class="card-number">6</span>
                <div class="card-title">
                    <span class="card-title-text">Ontvangstrobot</span>
                    <span class="card-arrow">›</span>
                </div>
            </div>

            <div class="card" onclick="openSection(6)">
                <img src="images/schrobzuigmachine.jpg" alt="Robot Schrob/Zuigmachine">
                <div class="card-overlay"></div>
                <span class="card-number">7</span>
                <div class="card-title">
                    <span class="card-title-text">Robot Schrob/Zuigmachine</span>
                    <span class="card-arrow">›</span>
                </div>
            </div>

        </div>

        </div>

    </section>

    <!-- DYNAMISCHE PAGINA'S -->
    <div id="sections"></div>

    <script src="js/app.js"></script>

</body>

</html>
