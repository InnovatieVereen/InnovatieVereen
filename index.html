<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zorgtechnologie bij Vereen</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HOME BUTTON -->
    <button class="home-btn" onclick="showHome()" aria-label="Home">
        🏠
    </button>

    <!-- HOMEPAGE -->
    <section id="home">

        <div class="hero">
            <h1>Zorgtechnologie bij Vereen</h1>
            <p>Ontdek innovaties die zorgmedewerkers en cliënten ondersteunen.</p>
        </div>

        <div class="grid">

            <div class="card" onclick="openSection(0)">
                <img src="images/exoskelet.jpg" alt="Exoskelet">
                <div class="card-title">Exoskelet</div>
            </div>

            <div class="card" onclick="openSection(1)">
                <img src="images/hume.jpg" alt="HUME Sok">
                <div class="card-title">HUME Sok</div>
            </div>

            <div class="card" onclick="openSection(2)">
                <img src="images/vendlet.jpg" alt="Vendlet Bed">
                <div class="card-title">Vendlet Bed</div>
            </div>

            <div class="card" onclick="openSection(3)">
                <img src="images/slimme-wc-bril.jpg" alt="Slimme Toiletbril">
                <div class="card-title">Slimme Toiletbril</div>
            </div>

            <div class="card" onclick="openSection(4)">
                <img src="images/attendi.jpg" alt="Attendi App">
                <div class="card-title">Attendi App</div>
            </div>

            <div class="card" onclick="openSection(5)">
                <img src="images/ontvangstrobot.jpg" alt="Ontvangstrobot">
                <div class="card-title">Ontvangstrobot</div>
            </div>

            <div class="card" onclick="openSection(6)">
                <img src="images/schrobzuigmachine.jpg" alt="Schrobzuigmachine">
                <div class="card-title">Robot Schrob/Zuigmachine</div>
            </div>

        </div>

    </section>

    <!-- DYNAMISCHE PAGINA'S -->
    <div id="sections"></div>

    <script src="js/app.js"></script>

</body>

</html>
